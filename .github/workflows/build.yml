name: Build CS2 ESP

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel olarak da tetiklenebilmesi için

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # En stabil sürüm için 8.0 kullanılmıştır

    - name: Restore NuGet Packages
      run: dotnet restore

    - name: Publish Standalone Executable
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:PublishReadyToRun=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./build

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CS2_ESP_Executable
        path: ./build/CS2_ESP.exe
